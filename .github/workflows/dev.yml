on:
  push:
    branches:
      - "*"
      - "*/*"
      - "**"
      - "!main"
      - "!master"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2
        with:
          tool: just
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        if: github.event_name != 'release' && github.event_name != 'workflow_dispatch'
      - run: just ci

  linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64]
    #        target: [x86_64, x86, aarch64, armv7]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.11"
      - name: Build wheels
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter --verbose
          sccache: "true"
          working-directory: ./utiles-pyo3
      #          manylinux: auto

      - name: pytest
        if: ${{ startsWith(matrix.target, 'x86_64') }}
        shell: bash
        run: |
          set -e
          cd utiles-pyo3
          pip install click
          pip install utiles --no-index --no-deps --find-links dist --force-reinstall
          pip install -r requirements.dev.txt
          pytest --benchmark-disable
