#[package]
#name = "utiles"
#version = "0.2.0"
#edition = "2021"
#include = ["src/**/*", "Cargo.toml", "LICENSE", "README.md"]
#license = "MIT OR Apache-2.0"
#
[workspace]
resolver = "2"
members = [
    "utiles-pyo3",
    "crates/utiles",
    "crates/utilesqlite",
    "crates/utiles-cli"
]

[workspace.package]
edition = "2021"
version = "0.2.0"
homepage = "https://github.com/jessekrubin/utiles"
documentation = "https://github.com/jessekrubin/utiles"
repository = "https://github.com/jessekrubin/utiles"
authors = ["Jesse K. Rubin <jessekrubin@gmail.com>"]
license = "MIT OR Apache-2.0"
#[[bin]]
#name = "utiles"

#[lib]
#name = "libutiles"
#crate-type = ["cdylib"]

#[dependencies]
#fast_hilbert = "2.0.0"
#geo-types = "0.7.9"
#pyo3 = "0.20.0"
#rusqlite = "0.29.0"
#serde = { version = "1.0", features = ["derive"] }
#serde_json = "1.0.96"
#utiles = { path = "crates/utiles" }
#utilesqlite = { path = "crates/utilesqlite" }
#utiles-cli = { path = "crates/utiles-cli" }
[workspace.dependencies]
anyhow = "1.0.75"
fast_hilbert = "2.0.0"
geo-types = "0.7.9"
geojson = "0.24.1"
pyo3 = "0.20.0"
pyo3-build-config = "0.20.0"
rusqlite = { version = "0.29.0", features = ["bundled", "vtab", "blob"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0.96"
thiserror = "1.0.50"
tilejson = "0.3.2"
tokio = { version = "1.33.0", features = ["full"] }
tracing = "0.1.40"
tracing-subscriber = { version = "0.3.17", features = ["serde", "serde_json", "env-filter"] }

[profile.dev]
opt-level = 0

[profile.release]
opt-level = 3
strip = true
#lto = true

#[dev-dependencies]
#pyo3 = { version = "0.20.0", features = ["auto-initialize"] }

#[build-dependencies]
#pyo3-build-config = "0.20.0"
